<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM AQUA EXPORTS - Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end border-b border-slate-800 pb-4 mb-8">
            <h1 class="text-3xl font-bold text-sky-400">SAM AQUA EXPORTS LLP</h1>
            <div id="dataStatus" class="text-sm bg-slate-800 text-slate-400 px-3 py-1 rounded border border-slate-700">
                Fetching Data...
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-emerald-400">Batch Parameters</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Target Packed Weight (kg)</label>
                        <input type="number" id="targetWeight" value="10000" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Target Packed Count</label>
                        <input type="number" id="targetCount" value="40" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Heading Yield (%)</label>
                        <input type="number" id="headingYield" value="70" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Process Mode</label>
                        <select id="processMode" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                            <option value="1">HLSO (100%)</option>
                            <option value="0.96" selected>PD (96%)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Peeling Yield (%)</label>
                        <input type="number" id="peelingYield" value="96" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Conversion Cost (₹/kg)</label>
                        <input type="number" id="conversionCost" value="104.96" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">USD Exchange Rate</label>
                        <input type="number" id="exchangeRate" value="92.63" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white">
                    </div>
                    <button onclick="runSimulation()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-3 rounded mt-4 transition-colors">
                        RUN SIMULATION
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col justify-center items-center text-center">
                        <div class="text-sm text-slate-400 mb-2 uppercase tracking-wider">Export Floor (USD)</div>
                        <div id="outExportUSD" class="text-4xl font-bold text-emerald-400">---</div>
                        <div class="text-sm text-slate-500 mt-2">per lb</div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col justify-center items-center text-center">
                        <div class="text-sm text-slate-400 mb-2 uppercase tracking-wider">Procurement Target</div>
                        <div id="outTargetCount" class="text-2xl font-bold text-sky-400 mb-1">---</div>
                        <div id="outTargetPrice" class="text-slate-300">---</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                        <h3 class="text-lg font-semibold mb-4 text-white">Physical Mass Balance</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between"><span class="text-slate-400">Raw Purchased:</span> <span id="outRawPurchased" class="font-medium">---</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">Final Packed:</span> <span id="outFinalPacked" class="font-medium text-emerald-400">---</span></div>
                            <div class="flex justify-between border-t border-slate-800 pt-3"><span class="text-slate-400">Organic Waste:</span> <span id="outWaste" class="font-medium text-orange-400">---</span></div>
                        </div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                        <h3 class="text-lg font-semibold mb-4 text-white">Financials (INR Lakhs)</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between"><span class="text-slate-400">Raw Value:</span> <span id="outRawValue" class="font-medium">---</span></div>
                            <div class="flex justify-between"><span class="text-slate-400">Factory Opex:</span> <span id="outOpex" class="font-medium">---</span></div>
                            <div class="flex justify-between border-t border-slate-800 pt-3"><span class="text-sky-400 font-semibold">Total Outlay:</span> <span id="outTotal" class="font-bold text-sky-400">---</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let marketPrices = {};

        window.onload = async function() {
            try {
                const response = await fetch('prices.json?t=' + new Date().getTime());
                if (response.ok) {
                    const data = await response.json();
                    marketPrices = data.prices;
                    document.getElementById('dataStatus').innerHTML = `<span class="text-emerald-400">●</span> ${data.status} (${data.timestamp})`;
                } else {
                    throw new Error("No data");
                }
            } catch (error) {
                document.getElementById('dataStatus').innerHTML = `<span class="text-orange-400">●</span> Error: No price data found.`;
            }
        };

        function getPriceForCount(targetCount, priceData) {
            let actualCount = Math.round(targetCount); // ROUNDS 26.9 to exactly 27

            if (priceData[actualCount]) {
                return priceData[actualCount];
            }

            const availableCounts = Object.keys(priceData).map(Number).sort((a, b) => a - b);
            const saferCount = availableCounts.find(c => c > actualCount);

            if (saferCount) {
                return priceData[saferCount];
            }
            return null;
        }

        function runSimulation() {
            if (Object.keys(marketPrices).length === 0) {
                alert("Market data not loaded yet.");
                return;
            }

            const packedWeight = parseFloat(document.getElementById('targetWeight').value);
            const packedCount = parseFloat(document.getElementById('targetCount').value);
            const headingYield = parseFloat(document.getElementById('headingYield').value) / 100;
            const peelingYield = parseFloat(document.getElementById('peelingYield').value) / 100;
            const processMode = parseFloat(document.getElementById('processMode').value);
            const convCost = parseFloat(document.getElementById('conversionCost').value);
            const usdRate = parseFloat(document.getElementById('exchangeRate').value);

            const totalYield = headingYield * peelingYield * processMode;
            const rawPurchased = packedWeight / totalYield;
            const organicWaste = rawPurchased - packedWeight;
            
            const rawCountRequired = packedCount * totalYield;
            const rawCountRounded = Math.round(rawCountRequired); 
            
            const rawPrice = getPriceForCount(rawCountRequired, marketPrices);

            if (!rawPrice) {
                alert("Error: Count out of market bounds.");
                return;
            }

            const rawValueTotal = rawPurchased * rawPrice;
            const opexTotal = packedWeight * convCost;
            const totalOutlay = rawValueTotal + opexTotal;
            
            const exportFloorUSD_kg = totalOutlay / packedWeight / usdRate;
            const exportFloorUSD_lb = exportFloorUSD_kg / 2.20462;

            document.getElementById('outTargetCount').innerText = `Buy ${rawCountRounded} Count`;
            document.getElementById('outTargetPrice').innerText = `@ ₹${rawPrice} / kg`;
            
            document.getElementById('outRawPurchased').innerText = rawPurchased.toLocaleString(undefined, {maximumFractionDigits:0}) + " kg";
            document.getElementById('outFinalPacked').innerText = packedWeight.toLocaleString(undefined, {maximumFractionDigits:0}) + " kg";
            document.getElementById('outWaste').innerText = organicWaste.toLocaleString(undefined, {maximumFractionDigits:0}) + " kg";

            document.getElementById('outRawValue').innerText = "₹" + (rawValueTotal/100000).toFixed(2) + " L";
            document.getElementById('outOpex').innerText = "₹" + (opexTotal/100000).toFixed(2) + " L";
            document.getElementById('outTotal').innerText = "₹" + (totalOutlay/100000).toFixed(2) + " L";
            
            document.getElementById('outExportUSD').innerText = "$" + exportFloorUSD_lb.toFixed(2);
        }
    </script>
</body>
</html>
